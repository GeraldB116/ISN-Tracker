<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Altera ISN Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    background: #f0f4f8;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── Banner ─────────────────────────────────────────────────── */
  .banner {
    background: #003087;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 64px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }
  .banner-left { display: flex; align-items: center; gap: 14px; }
  .banner-icon {
    width: 38px; height: 38px;
    background: #005eb8;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff; font-weight: 900;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.25);
  }
  .banner-title {
    color: #ffffff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .banner-sub {
    color: rgba(255,255,255,0.65);
    font-size: 12px;
    margin-top: 1px;
  }
  .banner-right {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    text-align: right;
  }
  .banner-accent {
    height: 4px;
    background: linear-gradient(90deg, #005eb8 0%, #0072ce 50%, #41b6e6 100%);
  }

  /* ── Layout wrapper ─────────────────────────────────────────── */
  .wrapper {
    max-width: 1280px;
    margin: 28px auto;
    padding: 0 20px;
  }

  /* ── Toolbar ────────────────────────────────────────────────── */
  .toolbar {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: #6b7280;
    font-size: 15px;
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1px solid #d0d7de;
    border-radius: 7px;
    font-size: 14px;
    color: #1a1a1a;
    background: #fafbfc;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: #005eb8;
    box-shadow: 0 0 0 3px rgba(0,94,184,0.12);
    background: #fff;
  }
  .search-wrap input::placeholder { color: #9ca3af; }
  .toolbar select {
    padding: 9px 12px;
    border: 1px solid #d0d7de;
    border-radius: 7px;
    font-size: 14px;
    color: #1a1a1a;
    background: #fafbfc;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    min-width: 160px;
  }
  .toolbar select:focus { border-color: #005eb8; }
  .btn-clear {
    padding: 9px 18px;
    background: #f3f4f6;
    border: 1px solid #d0d7de;
    border-radius: 7px;
    font-size: 13px;
    color: #374151;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-clear:hover { background: #e5e7eb; }
  .result-info {
    color: #6b7280;
    font-size: 13px;
    white-space: nowrap;
    margin-left: auto;
  }

  /* ── Table card ─────────────────────────────────────────────── */
  .card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }
  thead { background: #003087; }
  thead th {
    padding: 13px 16px;
    text-align: left;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.4px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  thead th:hover { background: #005eb8; }
  thead th .sort-arrow { margin-left: 5px; opacity: 0.55; font-size: 11px; }
  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f6ff; }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:nth-child(even):hover { background: #f0f6ff; }

  td {
    padding: 12px 16px;
    font-size: 13.5px;
    vertical-align: middle;
    color: #1a1a1a;
  }

  /* Reference badge */
  .ref-badge {
    display: inline-block;
    background: #e8f0fe;
    color: #003087;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .ref-empty {
    color: #9ca3af;
    font-size: 12px;
    font-style: italic;
  }

  /* ── Title link ──────────────────────────────────────────────── */
  .title-link {
    color: #005eb8;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s, text-decoration 0.15s;
  }
  .title-link:hover {
    color: #003087;
    text-decoration: underline;
  }
  .title-link:visited {
    color: #4c2c92;
  }

  /* Type pill */
  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .pill-standard   { background: #dbeafe; color: #1e40af; }
  .pill-collection { background: #d1fae5; color: #065f46; }
  .pill-both       { background: #ede9fe; color: #5b21b6; }
  .pill-consult    { background: #fef3c7; color: #92400e; }
  .pill-default    { background: #f3f4f6; color: #374151; }

  /* Date cell */
  .date-cell { white-space: nowrap; color: #374151; }

  /* Empty state */
  .empty-row td {
    text-align: center;
    padding: 48px 16px;
    color: #9ca3af;
    font-size: 15px;
  }

  /* ── Pagination ──────────────────────────────────────────────── */
  .pagination-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid #f0f0f0;
    background: #fafbfc;
  }
  .page-info { color: #6b7280; font-size: 13px; }
  .page-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .page-btn {
    min-width: 34px;
    height: 34px;
    padding: 0 8px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    background: #fff;
    color: #374151;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .page-btn:hover:not(:disabled):not(.active) {
    background: #f0f6ff;
    border-color: #005eb8;
    color: #003087;
  }
  .page-btn.active {
    background: #003087;
    color: #fff;
    border-color: #003087;
    cursor: default;
  }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-btn.ellipsis { border: none; background: none; cursor: default; color: #9ca3af; }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 640px) {
    .banner { padding: 0 16px; min-height: 56px; }
    .banner-title { font-size: 18px; }
    .wrapper { margin: 16px auto; padding: 0 12px; }
    .toolbar { padding: 12px; gap: 8px; }
    .result-info { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<!-- ── BANNER ─────────────────────────────────────────────────── -->
<header>
  <div class="banner">
    <div class="banner-left">
      <div class="banner-icon">A</div>
      <div>
        <div class="banner-title">Altera ISN Tracker</div>
        <div class="banner-sub">NHS Information Standards &amp; Collections</div>
      </div>
    </div>
    <div class="banner-right">
      Last updated: <span id="lastUpdated">27 Mar 2025</span>
    </div>
  </div>
  <div class="banner-accent"></div>
</header>

<!-- ── MAIN WRAPPER ───────────────────────────────────────────── -->
<div class="wrapper">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input
        type="text"
        id="searchInput"
        placeholder="Search by reference, title or type..."
        autocomplete="off"
      />
    </div>

    <select id="typeFilter">
      <option value="">All Types</option>
      <option value="Standard">Standard</option>
      <option value="Collection">Collection</option>
      <option value="Standard &amp; Collection">Standard &amp; Collection</option>
      <option value="Consultation">Consultation</option>
    </select>

    <select id="yearFilter">
      <option value="">All Years</option>
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026">2026</option>
    </select>

    <button class="btn-clear" onclick="clearFilters()">&#10005; Clear</button>

    <span class="result-info" id="resultInfo">Showing 0 items</span>
  </div>

  <!-- Table card -->
  <div class="card">
    <div class="table-wrap">
      <table id="mainTable">
        <thead>
          <tr>
            <th onclick="sortBy('ref')"   id="th-ref">
              Reference <span class="sort-arrow" id="arr-ref">&#8597;</span>
            </th>
            <th onclick="sortBy('title')" id="th-title">
              Title <span class="sort-arrow" id="arr-title">&#8597;</span>
            </th>
            <th onclick="sortBy('type')"  id="th-type">
              Type <span class="sort-arrow" id="arr-type">&#8597;</span>
            </th>
            <th onclick="sortBy('date')"  id="th-date">
              Date <span class="sort-arrow" id="arr-date">&#8597;</span>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Pagination bar -->
    <div class="pagination-bar">
      <span class="page-info" id="pageInfo">Page 1 of 1</span>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>

</div><!-- /wrapper -->

<script>
/* ═══════════════════════════════════════════════════════════════
   DATA — each item now includes a link field
   Dates stored as ISO "YYYY-MM-DD" displayed as DD/MM/YYYY
   ═══════════════════════════════════════════════════════════════ */
const DATA = [
  { ref:"DAPB4073", title:"Virtual Wards (Hospital at Home)", type:"Collection", status:"Approved", date:"2026-01-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb4073-virtual-wards", summary:"The Virtual Wards standard allows patients to receive hospital-level care at home, using technology to monitor their health. It applies to healthcare providers and patients who need ongoing support without being admitted to a hospital. This approach helps free up hospital resources and allows patients to recover in a more comfortable environment." },
  { ref:"DAPB3051", title:"Identity Verification and Authentication Standard for Digital Health and Care Services (Proxy standard)", type:"Standard", status:"Approved", date:"2025-12-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb3051-identity-verification-and-authentication-standard-for-digital-health-and-care-services", summary:"The Identity Verification and Authentication Standard ensures that individuals accessing digital health and care services are properly identified and authenticated, including those acting on behalf of patients. It applies to all health and care organizations using digital systems. This standard is important for protecting patient information and ensuring safe access to services." },
  { ref:"DAPB0089", title:"Cover of Vaccination Evaluated Rapidly (COVER)", type:"Standard & Collection", status:"Approved", date:"2025-10-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb0089-cover-of-vaccination-evaluated-rapidly-cover", summary:"The COVER standard helps collect and evaluate data on vaccination rates in children across England. It applies to healthcare providers and public health officials who monitor immunization efforts. This information is crucial for ensuring high vaccination coverage, which protects public health and prevents outbreaks of vaccine-preventable diseases." },
  { ref:"DAPB4019", title:"Reasonable Adjustment Digital Flag (RADF)", type:"Standard", status:"Approved", date:"2025-10-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb4019-reasonable-adjustment-digital-flag", summary:"The Reasonable Adjustment Digital Flag (RADF) standard helps healthcare providers identify and support patients who need special accommodations due to disabilities or other needs. It applies to all NHS organizations and ensures that these patients receive appropriate care tailored to their circumstances. This matters because it promotes equality in healthcare access and improves patient experiences and outcomes." },
  { ref:"DAPB0084", title:"OPCS 4.11", type:"Standard", status:"Approved", date:"2025-10-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb0084-opcs-classification-of-interventions-and-procedures", summary:"OPCS 4.11 is a standard that provides a consistent way to classify and code medical procedures in the NHS. It applies to healthcare professionals and organizations involved in recording and reporting these procedures. This standard is important because it ensures accurate data collection, which helps improve patient care and supports healthcare planning." },
  { ref:"DAPB1577", title:"Diagnostic Imaging Set (DIDS) v2", type:"Standard & Collection", status:"Approved", date:"2025-10-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb1577-diagnostic-imaging-data-set", summary:"The Diagnostic Imaging Set (DIDS) v2 is a standard that helps healthcare providers share and manage imaging data consistently. It applies to hospitals, clinics, and professionals involved in diagnostic imaging across the NHS. This standard is important because it improves the quality and safety of patient care by ensuring that imaging information is accurate and easily accessible." },
  { ref:"DAPB4067", title:"National Maternity Operational Pressures Situation Report (SitRep)", type:"Collection", status:"Approved", date:"2025-09-01", link:"https://future.nhs.uk/system/login?nextURL=%2Fconnect%2Eti%2FLocalTransformationHub%2Fview%3FobjectID%3D66746736", summary:"The National Maternity Operational Pressures Situation Report collects data on the pressures faced by maternity services across the NHS. It applies to maternity units and healthcare providers, helping them monitor and respond to challenges in delivering care. This information is crucial for ensuring safe and effective maternity services for mothers and babies." },
  { ref:"DAPB0086", title:"Data Security and Protection Toolkit v8", type:"Standard", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb0086-data-security-and-protection-toolkit", summary:"The Data Security and Protection Toolkit v8 helps healthcare organizations assess and improve their data security practices. It applies to all NHS bodies and organizations handling patient information. This standard is important because it ensures that sensitive data is protected, maintaining patient trust and safety in the healthcare system." },
  { ref:"DAPB2054-4026", title:"Friends and Family Test: Post-COVID Assessment Clinics Retired", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/standards-and-collections---withdrawn", summary:"The Friends and Family Test for Post-COVID Assessment Clinics has been retired, meaning it is no longer collecting feedback from patients about their experiences in these clinics. This change applies to healthcare providers and patients who previously participated in the test. It matters because it allows resources to be redirected to other important assessments and improvements in patient care." },
  { ref:"DAPB2054-3144", title:"Friends and Family Test: Quarterly Staff Survey", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/national-quarterly-pulse-survey-collection", summary:"The Friends and Family Test: Quarterly Staff Survey collects feedback from NHS staff about their experiences at work. It applies to all NHS employees and helps identify areas for improvement in workplace culture and staff wellbeing. This feedback is crucial for enhancing staff satisfaction, which ultimately leads to better patient care." },
  { ref:"DAPB2090-2171", title:"GPES: Learning Disabilities Data (LDD) 2024-25", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/gp-data-collections", summary:"The GPES Learning Disabilities Data standard collects important information about patients with learning disabilities to improve their care and support. It applies to general practices and healthcare providers across the NHS. This data is crucial for understanding the needs of these patients and ensuring they receive appropriate services and resources." },
  { ref:"DAPB3042", title:"Resident Doctors (RDs): Rota Code of Practice Compliance", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/resident-doctors-rota-code-of-practice-compliance-data-collection", summary:"The Rota Code of Practice Compliance standard ensures that resident doctors have fair and safe working schedules. It applies to all healthcare organizations employing resident doctors in the NHS. This matters because it helps improve doctors' well-being and patient care by promoting better working conditions." },
  { ref:"DAPB1605", title:"Accessible Information", type:"Standard", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb1605-accessible-information", summary:"The Accessible Information standard ensures that people with disabilities receive information in a way they can understand, such as large print or easy-read formats. It applies to all health and care providers in England. This matters because clear communication improves patient care and helps everyone access the services they need effectively." },
  { ref:"DAPB2235-01", title:"GPES: National Diabetes Audit (Core)", type:"Collection", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/gp-data-collections", summary:"The National Diabetes Audit collects data from general practices about patients with diabetes to assess the quality of care they receive. It applies to all GP practices in England and helps identify areas for improvement in diabetes treatment and management. This is important because better care can lead to healthier outcomes for patients living with diabetes." },
  { ref:"DAPB4122", title:"Oliver McGowan Training", type:"Collection", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/oliver-mcgowan-mandatory-training-on-learning-disability-and-autism", summary:"The Oliver McGowan Training standard provides essential training for health and social care staff on how to support individuals with learning disabilities and autism. It applies to all professionals working in these sectors. This training is important because it helps ensure that people with these conditions receive better, more understanding care, improving their overall health and wellbeing." },
  { ref:"DAPB1533", title:"Systemic Anti-Cancer Therapy Data Set", type:"Standard", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb1533-systemic-anti-cancer-therapy-data-set-sact", summary:"The Systemic Anti-Cancer Therapy Data Set standard collects important information about cancer treatments given to patients. It applies to healthcare providers involved in cancer care, ensuring they share consistent data. This matters because it helps improve patient care, track treatment outcomes, and support research in cancer therapies." },
  { ref:"DAPB4121", title:"Canonical Data Model (Draft)", type:"Standard", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb4121-canonical-data-model-cdm", summary:"The Canonical Data Model is a draft standard that provides a common way to organize and share health data across different systems. It applies to healthcare organizations and technology providers involved in data exchange. This standard is important because it helps ensure that health information is consistent and easily understood, improving communication and patient care." },
  { ref:"DAPB3139", title:"Mental Health, Learning Disability, Autism (MHLDA) Sit Reps", type:"Collection", status:"Approved", date:"2025-05-01", link:"https://digital.nhs.uk/about-nhs-digital/corporate-information-and-documents/directions-and-data-provision-notices/data-provision-notices-dpns/covid-19-sitreps/covid-19-situation-reports", summary:"The Mental Health, Learning Disability, Autism Sit Reps standard collects important data about the care and support provided to individuals with mental health issues, learning disabilities, and autism. It applies to healthcare providers and organizations involved in mental health services. This information is crucial for improving services, understanding needs, and ensuring better outcomes for these vulnerable groups." },
  { ref:"DAPB1521", title:"Cancer Outcomes and Services Data set (COSD)", type:"Standard", status:"Approved", date:"2025-05-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb1521-cancer-outcomes-and-services-data-set", summary:"The Cancer Outcomes and Services Data set (COSD) collects important information about cancer patients and their treatment across the NHS. It applies to healthcare providers involved in cancer care, including hospitals and clinics. This standard matters because it helps improve cancer services and outcomes by ensuring that data is consistently collected and used for better patient care and research." },
  { ref:"DAPB2090-3038", title:"GPES: Physical Health Checks for people with Severe Mental Illness (PHSMI)", type:"Standard", status:"Approved", date:"2025-05-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/gp-data-collections", summary:"The GPES standard ensures that people with severe mental illness receive regular physical health checks. It applies to healthcare providers and professionals involved in the care of these patients. This is important because it helps identify and address physical health issues early, improving overall health and quality of life for this vulnerable group." },
  { ref:"DAPB2090-2183", title:"GPES: Quality and Outcomes Framework (QOF)", type:"Collection", status:"Approved", date:"2025-05-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/gp-data-collections", summary:"The GPES: Quality and Outcomes Framework (QOF) standard collects data on the quality of care provided by general practitioners (GPs) in England. It applies to all GP practices and helps ensure they meet specific health care targets. This matters because it supports improvements in patient care and health outcomes across the country." },
  { ref:"DAPB4003", title:"Board Vacancies and Commercial Spend", type:"Collection", status:"Approved", date:"2025-05-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/board-vacancies-and-commercial-spend-collection", summary:"The Board Vacancies and Commercial Spend standard collects data on job openings in NHS boards and their spending on commercial services. It applies to NHS organizations and helps ensure transparency and accountability in how they manage resources. This information is important for improving governance and making informed decisions about staffing and expenditures." },
  { ref:"DAPB0095", title:"Referral to Treatment", type:"Collection", status:"Approved", date:"2025-05-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/consultant-led-referral-to-treatment-waiting-times-rtt", summary:"The Referral to Treatment standard tracks how long patients wait for treatment after being referred by their doctor. It applies to healthcare providers across the NHS in England. This information is crucial for improving patient care, reducing wait times, and ensuring that everyone receives timely medical attention." },

/* ═══════════════════════════════════════════════════════════════
   DATE FORMATTING — DD/MM/YYYY
   ═══════════════════════════════════════════════════════════════ */
function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

/* ═══════════════════════════════════════════════════════════════
   TYPE PILL
   ═══════════════════════════════════════════════════════════════ */
function typePill(type) {
  if (!type) return '<span class="pill pill-default">-</span>';
  const t = type.toLowerCase();
  if (t.includes("standard") && t.includes("collection"))
    return `<span class="pill pill-both">${type}</span>`;
  if (t === "standard")
    return `<span class="pill pill-standard">${type}</span>`;
  if (t === "collection")
    return `<span class="pill pill-collection">${type}</span>`;
  if (t.includes("consultation"))
    return `<span class="pill pill-consult">${type}</span>`;
  return `<span class="pill pill-default">${type}</span>`;
}

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
const PAGE_SIZE = 25;
let currentPage = 1;
let sortKey     = "date";
let sortDir     = -1;
let filtered    = [];

/* ═══════════════════════════════════════════════════════════════
   FILTER
   ═══════════════════════════════════════════════════════════════ */
function applyFilters() {
  const search = document.getElementById("searchInput").value.toLowerCase().trim();
  const typeF  = document.getElementById("typeFilter").value;
  const yearF  = document.getElementById("yearFilter").value;

  filtered = DATA.filter(item => {
    const matchSearch = !search ||
      item.ref.toLowerCase().includes(search) ||
      item.title.toLowerCase().includes(search) ||
      item.type.toLowerCase().includes(search);
    const matchType = !typeF || item.type === typeF;
    const matchYear = !yearF || item.date.startsWith(yearF);
    return matchSearch && matchType && matchYear;
  });

  filtered.sort((a, b) => {
    let va = a[sortKey] || "";
    let vb = b[sortKey] || "";
    if (va < vb) return -1 * sortDir;
    if (va > vb) return  1 * sortDir;
    return 0;
  });

  currentPage = 1;
  render();
}

/* ═══════════════════════════════════════════════════════════════
   SORT
   ═══════════════════════════════════════════════════════════════ */
function sortBy(key) {
  if (sortKey === key) { sortDir = -sortDir; }
  else { sortKey = key; sortDir = 1; }
  updateSortArrows();
  applyFilters();
}

function updateSortArrows() {
  ["ref","title","type","date"].forEach(c => {
    const th  = document.getElementById(`th-${c}`);
    const arr = document.getElementById(`arr-${c}`);
    if (c === sortKey) {
      th.classList.add("sorted");
      arr.innerHTML = sortDir === 1 ? "&#8593;" : "&#8595;";
    } else {
      th.classList.remove("sorted");
      arr.innerHTML = "&#8597;";
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   RENDER TABLE
   ═══════════════════════════════════════════════════════════════ */
function render() {
  const totalItems = filtered.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const end   = Math.min(start + PAGE_SIZE, totalItems);
  const page  = filtered.slice(start, end);

  const tbody = document.getElementById("tableBody");

  if (page.length === 0) {
    tbody.innerHTML = `
      <tr class="empty-row">
        <td colspan="4">&#128203; No items match your search or filter.</td>
      </tr>`;
  } else {
    tbody.innerHTML = page.map(item => {

      /* Reference cell */
      const refCell = item.ref
        ? `<span class="ref-badge">${item.ref}</span>`
        : `<span class="ref-empty">-</span>`;

      /* Title cell — clickable link if link field is present */
      const titleCell = item.link
        ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="title-link">${item.title}</a>`
        : item.title;

      return `
        <tr>
          <td>${refCell}</td>
          <td>${titleCell}</td>
          <td>${typePill(item.type)}</td>
          <td class="date-cell">${fmtDate(item.date)}</td>
        </tr>`;
    }).join("");
  }

  /* Result info */
  const from = totalItems === 0 ? 0 : start + 1;
  document.getElementById("resultInfo").textContent =
    `Showing ${from}-${end} of ${totalItems} item${totalItems !== 1 ? "s" : ""}`;

  /* Page info */
  document.getElementById("pageInfo").textContent =
    `Page ${currentPage} of ${totalPages}`;

  renderPagination(totalPages);
}

/* ═══════════════════════════════════════════════════════════════
   RENDER PAGINATION
   ═══════════════════════════════════════════════════════════════ */
function renderPagination(totalPages) {
  const container = document.getElementById("pageBtns");
  container.innerHTML = "";

  function btn(label, action, disabled, active, ellipsis) {
    const b = document.createElement("button");
    b.className = "page-btn" +
      (active    ? " active"   : "") +
      (ellipsis  ? " ellipsis" : "");
    b.innerHTML = label;
    b.disabled  = disabled;
    if (!disabled && !active && !ellipsis) b.onclick = action;
    container.appendChild(b);
  }

  btn("&#171; First", () => goTo(1),                currentPage === 1,          false, false);
  btn("&#8249; Prev",  () => goTo(currentPage - 1), currentPage === 1,          false, false);

  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push("...");
    const lo = Math.max(2, currentPage - 1);
    const hi = Math.min(totalPages - 1, currentPage + 1);
    for (let i = lo; i <= hi; i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push("...");
    pages.push(totalPages);
  }

  pages.forEach(p => {
    if (p === "...") { btn("...", null, true, false, true); }
    else { btn(p, () => goTo(p), false, p === currentPage, false); }
  });

  btn("Next &#8250;", () => goTo(currentPage + 1), currentPage === totalPages, false, false);
  btn("Last &#187;",  () => goTo(totalPages),       currentPage === totalPages, false, false);
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
function goTo(page) {
  currentPage = page;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ═══════════════════════════════════════════════════════════════
   CLEAR FILTERS
   ═══════════════════════════════════════════════════════════════ */
function clearFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("typeFilter").value  = "";
  document.getElementById("yearFilter").value  = "";
  applyFilters();
}

/* ═══════════════════════════════════════════════════════════════
   EVENT LISTENERS + BOOT
   ═══════════════════════════════════════════════════════════════ */
document.getElementById("searchInput").addEventListener("input",  applyFilters);
document.getElementById("typeFilter").addEventListener("change", applyFilters);
document.getElementById("yearFilter").addEventListener("change", applyFilters);

updateSortArrows();
applyFilters();
</script>

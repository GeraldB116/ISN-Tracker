<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Altera ISN Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    background: #f0f4f8;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── Banner ─────────────────────────────────────────────────── */
  .banner {
    background: #003087;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 64px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }
  .banner-left { display: flex; align-items: center; gap: 14px; }
  .banner-icon {
    width: 38px; height: 38px;
    background: #005eb8;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff; font-weight: 900;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.25);
  }
  .banner-title {
    color: #ffffff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .banner-sub {
    color: rgba(255,255,255,0.65);
    font-size: 12px;
    margin-top: 1px;
  }
  .banner-right {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    text-align: right;
  }
  .banner-accent {
    height: 4px;
    background: linear-gradient(90deg, #005eb8 0%, #0072ce 50%, #41b6e6 100%);
  }

  /* ── Layout wrapper ─────────────────────────────────────────── */
  .wrapper {
    max-width: 1280px;
    margin: 28px auto;
    padding: 0 20px;
  }

  /* ── Toolbar ────────────────────────────────────────────────── */
  .toolbar {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: #6b7280;
    font-size: 15px;
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1px solid #d0d7de;
    border-radius: 7px;
    font-size: 14px;
    color: #1a1a1a;
    background: #fafbfc;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: #005eb8;
    box-shadow: 0 0 0 3px rgba(0,94,184,0.12);
    background: #fff;
  }
  .search-wrap input::placeholder { color: #9ca3af; }
  .toolbar select {
    padding: 9px 12px;
    border: 1px solid #d0d7de;
    border-radius: 7px;
    font-size: 14px;
    color: #1a1a1a;
    background: #fafbfc;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    min-width: 160px;
  }
  .toolbar select:focus { border-color: #005eb8; }
  .btn-clear {
    padding: 9px 18px;
    background: #f3f4f6;
    border: 1px solid #d0d7de;
    border-radius: 7px;
    font-size: 13px;
    color: #374151;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-clear:hover { background: #e5e7eb; }
  .result-info {
    color: #6b7280;
    font-size: 13px;
    white-space: nowrap;
    margin-left: auto;
  }

  /* ── Table card ─────────────────────────────────────────────── */
  .card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }
  thead { background: #003087; }
  thead th {
    padding: 13px 16px;
    text-align: left;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.4px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  thead th:hover { background: #005eb8; }
  thead th .sort-arrow { margin-left: 5px; opacity: 0.55; font-size: 11px; }
  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f6ff; }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:nth-child(even):hover { background: #f0f6ff; }

  td {
    padding: 12px 16px;
    font-size: 13.5px;
    vertical-align: middle;
    color: #1a1a1a;
  }

  /* Reference badge */
  .ref-badge {
    display: inline-block;
    background: #e8f0fe;
    color: #003087;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .ref-empty {
    color: #9ca3af;
    font-size: 12px;
    font-style: italic;
  }

  /* ── Title link ──────────────────────────────────────────────── */
  .title-link {
    color: #005eb8;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s, text-decoration 0.15s;
  }
  .title-link:hover {
    color: #003087;
    text-decoration: underline;
  }
  .title-link:visited {
    color: #4c2c92;
  }

  /* Type pill */
  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .pill-standard   { background: #dbeafe; color: #1e40af; }
  .pill-collection { background: #d1fae5; color: #065f46; }
  .pill-both       { background: #ede9fe; color: #5b21b6; }
  .pill-consult    { background: #fef3c7; color: #92400e; }
  .pill-default    { background: #f3f4f6; color: #374151; }

  /* Date cell */
  .date-cell { white-space: nowrap; color: #374151; }

  /* Empty state */
  .empty-row td {
    text-align: center;
    padding: 48px 16px;
    color: #9ca3af;
    font-size: 15px;
  }

  /* ── Pagination ──────────────────────────────────────────────── */
  .pagination-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid #f0f0f0;
    background: #fafbfc;
  }
  .page-info { color: #6b7280; font-size: 13px; }
  .page-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .page-btn {
    min-width: 34px;
    height: 34px;
    padding: 0 8px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    background: #fff;
    color: #374151;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .page-btn:hover:not(:disabled):not(.active) {
    background: #f0f6ff;
    border-color: #005eb8;
    color: #003087;
  }
  .page-btn.active {
    background: #003087;
    color: #fff;
    border-color: #003087;
    cursor: default;
  }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-btn.ellipsis { border: none; background: none; cursor: default; color: #9ca3af; }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 640px) {
    .banner { padding: 0 16px; min-height: 56px; }
    .banner-title { font-size: 18px; }
    .wrapper { margin: 16px auto; padding: 0 12px; }
    .toolbar { padding: 12px; gap: 8px; }
    .result-info { margin-left: 0; width: 100%; }
  }
</style>
</head>

<!-- ── BANNER ─────────────────────────────────────────────────── -->
<header>
  <div class="banner">
    <div class="banner-left">
      <div class="banner-icon">A</div>
      <div>
        <div class="banner-title">Altera ISN Tracker</div>
        <div class="banner-sub">NHS Information Standards &amp; Collections</div>
      </div>
    </div>
    <div class="banner-right">
      Last updated: <span id="lastUpdated">27 Mar 2025</span>
    </div>
  </div>
  <div class="banner-accent"></div>
</header>

<!-- ── MAIN WRAPPER ───────────────────────────────────────────── -->
<div class="wrapper">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input
        type="text"
        id="searchInput"
        placeholder="Search by reference, title or type..."
        autocomplete="off"
      />
    </div>

    <select id="typeFilter">
      <option value="">All Types</option>

      <option value="2026">2026</option>

    <span class="result-info" id="resultInfo">Showing 0 items</span>
  </div>

  <!-- Table card -->
  <div class="card">
    <div class="table-wrap">
      <table id="mainTable">
        <thead>
          <tr>
            <th onclick="sortBy('ref')"   id="th-ref">
              Reference <span class="sort-arrow" id="arr-ref">&#8597;</span>
            </th>
            <th onclick="sortBy('title')" id="th-title">
              Title <span class="sort-arrow" id="arr-title">&#8597;</span>
            </th>
            <th onclick="sortBy('type')"  id="th-type">
              Type <span class="sort-arrow" id="arr-type">&#8597;</span>
            </th>
            <th onclick="sortBy('date')"  id="th-date">
              Date <span class="sort-arrow" id="arr-date">&#8597;</span>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Pagination bar -->
    <div class="pagination-bar">
      <span class="page-info" id="pageInfo">Page 1 of 1</span>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>

</div><!-- /wrapper -->

const DATA = [
  { ref:"DAPB4073", title:"Virtual Wards (Hospital at Home)", type:"Collection", status:"Approved", date:"2026-01-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb4073-virtual-wards", conformance:"", documents:"[{\"title\": \"Data Assurance Board\", \"url\": \"https://digital.nhs.uk/data-and-information/information-standards/governance\", \"type\": \"page\"}, {\"title\": \"Dataset Specification v1\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/4073/virtual-ward-dataset-specification-v2.09--external.xlsx\", \"type\": \"word\"}, {\"title\": \"Transparency Notice for Healthcare Operational Data flows for Virtual Wards (Pilot) - NHS England Digital\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-sets/virtual-wards-minimum-data-set/transparency-notice\", \"type\": \"page\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#670209000b0609034921232127090f1449090213\", \"type\": \"page\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#324141561c5c53465b5d5c535e415740445b515756574159725c5a411c5c5746\", \"type\": \"page\"}]", summary:"OVERVIEW  
Virtual wards, also known as hospital at home, enable patients to receive necessary medical care in the comfort of their own homes instead of being admitted to a hospital. This initiative is part of the NHS's strategy to enhance patient care by providing services closer to home, including in care homes. A new data set will be collected daily to monitor the operation and effectiveness of these virtual wards.

WHO IT APPLIES TO  
This initiative applies to healthcare providers and professionals involved in the delivery of care through virtual wards, as well as patients who are eligible to receive care at home. It is particularly relevant for those working in community health services and care homes, where the integration of virtual ward services can improve patient outcomes.

WHY IT MATTERS  
The introduction of virtual wards is significant as it aligns with the NHS's 10 Year Health Plan, promoting a shift towards more localized care. By allowing patients to be treated at home, the NHS aims to enhance patient comfort, reduce hospital congestion, and improve overall healthcare efficiency. This approach also supports the broader goal of providing high-quality care tailored to individual needs.

COMPLIANCE  
Compliance with the new data collection requirements is essential for ensuring the effective operation of virtual wards. Healthcare providers must adhere to the guidelines set forth in the dataset specification and transparency notice to maintain data integrity and support the ongoing evaluation of these services. This compliance will help in optimizing care delivery and ensuring patient safety." },
  { ref:"DAPB3051", title:"Identity Verification and Authentication Standard for Digital Health and Care Services (Proxy standard)", type:"Standard", status:"Approved", date:"2025-12-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb3051-identity-verification-and-authentication-standard-for-digital-health-and-care-services", conformance:"", documents:"[{\"title\": \"Data Assurance Board\", \"url\": \"https://digital.nhs.uk/data-and-information/information-standards/governance\", \"type\": \"page\"}, {\"title\": \"DAPB3051: Requirements Specification (v3.1)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb3051-amd-51-2025/dapb3051amd_592025_reqspec-3.1.pdf\", \"type\": \"pdf\"}, {\"title\": \"DAPB3051: Supporting Implementation Guidance (v3.1)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb3051-amd-51-2025/dapb3051_amd_592025_supportingguidance-v3.1.pdf\", \"type\": \"pdf\"}, {\"title\": \"Proxy (v1)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb3051-amd-51-2025/dapb3051_amd592025_authorisation-use-case-proxy-implementation-guidance-v1.pdf\", \"type\": \"pdf\"}, {\"title\": \"NHS login\", \"url\": \"https://digital.nhs.uk/services/nhs-login\", \"type\": \"page\"}, {\"title\": \"Proxy Access: Advice and Guidance\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb3051-amd-51-2025/dapb3051_amd_592025_proxy-access---advice-and-guidance-v1.pdf\", \"type\": \"pdf\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#6d08030a010c03094303051e01020a04032d03051e43030819\", \"type\": \"page\"}]", summary:"OVERVIEW  
The Identity Verification and Authentication Standard for Digital Health and Care Services establishes a uniform method for managing identities within digital health and care services. This standard ensures that roles, including proxy access, are securely verified and authenticated, allowing for streamlined access to services while maintaining high security and auditability.

WHO IT APPLIES TO  
This standard is relevant to all digital health and care services that involve patient data, service users, and those engaged in direct care or commissioning. It particularly applies to organizations and individuals who utilize proxy access to manage or analyze health and care data.

WHY IT MATTERS  
Implementing this standard enhances the security of digital health services by providing a controlled access protocol, which reduces the complexity of multiple logins for users. It also ensures that sensitive health information is protected, thereby fostering trust among patients and service users in the digital health ecosystem.

COMPLIANCE  
All organizations and services utilizing digital health technologies must adhere to this standard to ensure secure identity management and authentication practices. Compliance will be monitored through the relevant key documents and guidance provided, ensuring that all digital interactions within health and care are both secure and efficient." },
  { ref:"DAPB0089", title:"Cover of Vaccination Evaluated Rapidly (COVER)", type:"Standard & Collection", status:"Approved", date:"2025-10-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb0089-cover-of-vaccination-evaluated-rapidly-cover", conformance:"", documents:"[{\"title\": \"Data Assurance Board\", \"url\": \"https://digital.nhs.uk/data-and-information/information-standards/governance\", \"type\": \"page\"}, {\"title\": \"Requirements Specification (v2.4)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0089/dapb0089_amd_50-2025_cover_requirements_spec.pdf\", \"type\": \"pdf\"}, {\"title\": \"Implementation Guidance (v2.4)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0089/dapb0089_amd_50_2025_implementationguide.pdf\", \"type\": \"pdf\"}, {\"title\": \"Change Specification (v2.4)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0089/dapb0089_amd_50-2025_cover_change_spec.pdf\", \"type\": \"pdf\"}, {\"title\": \"Requirements Specification (Appendix 1-v2.4)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0089/dapb0089_amd_50-2025_cover-requirement-specification_app1.xlsx\", \"type\": \"word\"}, {\"title\": \"NHSDD Change request COVER AMD50 2025\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0089/nhsdd_change-request-cover-amd50_2025.pdf\", \"type\": \"pdf\"}, {\"title\": \"NHSDD Change request COVER AMD50 2025 02\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0089/nhsdd_change-request-cover-amd50_2025_02.pdf\", \"type\": \"pdf\"}, {\"title\": \"COVER (Data Collections, NHS England)\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/cover-of-vaccination-evaluated-rapidly\", \"type\": \"page\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#f79498819285b7829c9f8496d9909881d9829c\", \"type\": \"page\"}]", summary:"OVERVIEW  
The COVER (Cover of Vaccination Evaluated Rapidly) surveillance scheme is designed to assess the effectiveness of the childhood immunisation programme in England. It focuses on children aged one, two, and five years, collecting vaccine coverage data from General Practices and local authorities on a quarterly and annual basis.

WHO IT APPLIES TO  
This scheme is relevant to healthcare providers, including General Practices and Local Child Health Information Services (CHISs), that are involved in the administration and monitoring of childhood vaccinations. It also pertains to the Joint Committee on Vaccination and Immunisation (JCVI), which provides guidance on vaccination policies.

WHY IT MATTERS  
The COVER scheme plays a crucial role in ensuring that children receive timely vaccinations, which is essential for public health. By evaluating immunisation coverage, the scheme helps identify gaps in vaccination rates and informs strategies to improve childhood health outcomes across England.

COMPLIANCE  
Compliance with the COVER scheme requires modifications to existing CHIS systems to accommodate new data fields as specified in the implementation guidance. Regular submission of accurate vaccine coverage data is essential for the ongoing evaluation of the immunisation programme and adherence to national health standards." },
  { ref:"DAPB4019", title:"Reasonable Adjustment Digital Flag (RADF)", type:"Standard", status:"Approved", date:"2025-10-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb4019-reasonable-adjustment-digital-flag", conformance:"", documents:"[{\"title\": \"Data Assurance Board\", \"url\": \"https://digital.nhs.uk/data-and-information/information-standards/governance\", \"type\": \"page\"}, {\"title\": \"Implementation guidance (Amd 41/2025)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/4019/dapb4019-_41_2025_implementation-guidance-.pdf\", \"type\": \"pdf\"}, {\"title\": \"Change specification (Amd 41/2025)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/4019/4019_41_2025-change-spec.pdf\", \"type\": \"pdf\"}, {\"title\": \"Requirements specification (Amd 41/2025)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/4019/4019_41_2025_reqspec.pdf\", \"type\": \"pdf\"}, {\"title\": \"Patient Flags Service - FHIR API - NHS England Digital\", \"url\": \"https://digital.nhs.uk/developer/api-catalogue/patient-flags-service---fhir-api\", \"type\": \"page\"}, {\"title\": \"Access to test data\", \"url\": \"https://digital.nhs.uk/services/path-to-live-environments/setting-up-test-data-in-our-path-to-live-environments\", \"type\": \"page\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#ceaba0a9a2afa0aae0a0a6bde0beafbcbaa7ada7beafbaa7a1a08ea0a6bde0a0abba\", \"type\": \"page\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#afeac1c8c3cec1cb81ddcecbc9dfddc0c5caccdbefc1c7dc81c1cadb\", \"type\": \"page\"}]", summary:"OVERVIEW  
The Reasonable Adjustment Digital Flag (RADF) is a new standard set to be implemented on October 1, 2025. This digital tool allows health and care professionals to record, share, and access information about the reasonable adjustments needed for individuals with disabilities across the NHS and social care services. It aims to ensure that these individuals receive equitable access to care by highlighting specific needs and adjustments required.

WHO IT APPLIES TO  
The RADF applies to all health and care professionals within the NHS and social care sectors who interact with patients requiring reasonable adjustments due to disabilities. It is particularly relevant for those involved in patient care, administration, and data management, ensuring that everyone involved in a patient's journey is aware of their specific needs.

WHY IT MATTERS  
This initiative is crucial for enhancing the accessibility of healthcare services for individuals with disabilities, in line with the legal obligations under the Equality Act 2010. By implementing the RADF, the NHS aims to create a more inclusive environment where all patients can receive the care they need without facing barriers, ultimately leading to improved health outcomes and patient satisfaction.

COMPLIANCE  
Compliance with the RADF standard is essential for all NHS and social care organizations, as it aligns with legal requirements to provide equitable access to services. Organizations will need to adhere to the implementation guidance and specifications provided by the Data Assurance Board to ensure proper use of the digital flag and maintain the integrity of patient data." },
  { ref:"DAPB0084", title:"OPCS 4.11", type:"Standard", status:"Approved", date:"2025-10-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb0084-opcs-classification-of-interventions-and-procedures", conformance:"", documents:"[{\"title\": \"Data Assurance Board\", \"url\": \"https://digital.nhs.uk/data-and-information/information-standards/governance\", \"type\": \"page\"}, {\"title\": \"Change spec\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0084-opcs-classification-of-interventions-and-procedures/0084_362025changespec.pdf\", \"type\": \"pdf\"}, {\"title\": \"Requirements specification\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0084-opcs-classification-of-interventions-and-procedures/0084_362025_requirementsspec.pdf\", \"type\": \"pdf\"}, {\"title\": \"Implementation guide\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0084-opcs-classification-of-interventions-and-procedures/0084_362025_implementationguidance.pdf\", \"type\": \"pdf\"}, {\"title\": \"Summary of core changes\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0084-opcs-classification-of-interventions-and-procedures/opcs-4.10toopcs-4.11summaryofcorechangesv2.pdf\", \"type\": \"pdf\"}, {\"title\": \"Clinical Classifications - NHS England Digital\", \"url\": \"https://digital.nhs.uk/services/terminology-and-classifications/clinical-classifications\", \"type\": \"page\"}, {\"title\": \"Delen: Home - NHS England\", \"url\": \"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dcb0160-clinical-risk-management-its-application-in-the-deployment-and-use-of-health-it-systems/\", \"type\": \"page\"}, {\"title\": \"NHS Data Model and Dictionary Change request\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0084-opcs-classification-of-interventions-and-procedures/cr1944-2025-10-29.pdf\", \"type\": \"pdf\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#81f2f4f1f1eef3f5afe5e8e6e8f5e0edf2e4f3f7e8e2e4f2c1efe9f2afefe4f5\", \"type\": \"page\"}]", summary:"OVERVIEW  
OPCS-4 is a standard classification system used for coding clinical interventions and procedures performed in NHS hospitals. It is essential for the accurate collection and analysis of healthcare data, ensuring consistency across the NHS. The latest version, OPCS-4.11, is set to be approved on October 1, 2025.

WHO IT APPLIES TO  
This standard applies to all healthcare providers within the NHS that are required to report data on interventions and procedures. It is particularly relevant for clinical coders, healthcare administrators, and data analysts who work with hospital data. Compliance with this standard is essential for effective data management and reporting.

WHY IT MATTERS  
Implementing OPCS-4 ensures that healthcare data is consistently coded, which is crucial for monitoring healthcare quality, resource allocation, and clinical outcomes. Accurate coding supports better decision-making and policy development within the NHS, ultimately leading to improved patient care. It also facilitates research and analysis of healthcare trends and practices.

COMPLIANCE  
Compliance with the OPCS-4 standard is mandated under Section 250 of the Health and Social Care Act 2012. All relevant healthcare providers must adhere to this standard when submitting data on interventions and procedures to ensure the integrity and reliability of NHS data. Non-compliance could result in challenges in data analysis and reporting, affecting healthcare delivery and funding decisions." },

The Diagnostic Imaging Data Set (DIDS) v2 is a standard that enables the NHS to collect and analyze data on diagnostic imaging activities. This dataset is crucial for understanding patient outcomes and improving healthcare services by tracking various metrics related to imaging tests, including patient demographics and waiting times.

WHO IT APPLIES TO  
The DIDS v2 applies to all NHS organizations that perform diagnostic imaging tests. This includes hospitals and clinics that utilize Radiology Information Systems (RISs) to manage imaging data and are responsible for submitting this information monthly to the NHS.

WHY IT MATTERS  
The implementation of DIDS v2 is essential for enhancing patient care by providing insights into imaging practices and outcomes. By analyzing this data, the NHS can identify trends, improve efficiency, and ultimately work towards better health outcomes for patients, such as increased life expectancy and improved quality of life.

COMPLIANCE  
Compliance with the DIDS v2 standard is mandatory for all relevant NHS organizations. Adhering to the guidelines and specifications outlined in the implementation tools and guidance ensures that data is accurately collected and reported, which is vital for effective monitoring and improvement of diagnostic imaging services across the NHS." },
  { ref:"DAPB4067", title:"National Maternity Operational Pressures Situation Report (SitRep)", type:"Collection", status:"Approved", date:"2025-09-01", link:"https://future.nhs.uk/system/login?nextURL=%2Fconnect%2Eti%2FLocalTransformationHub%2Fview%3FobjectID%3D66746736", conformance:"", documents:"", summary:"OVERVIEW

  { ref:"DAPB0086", title:"Data Security and Protection Toolkit v8", type:"Standard", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb0086-data-security-and-protection-toolkit", conformance:"", documents:"[{\"title\": \"Data Assurance Board\", \"url\": \"https://digital.nhs.uk/data-and-information/information-standards/governance\", \"type\": \"page\"}, {\"title\": \"Change specification (Amd 21/2025)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0086-data-security-and-protection-toolkit/dapb0086/0086_v8_2025_08_11_changespec.pdf\", \"type\": \"pdf\"}, {\"title\": \"Implementation Guide (Amd 21/2025)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0086-data-security-and-protection-toolkit/dapb0086/0086_2025_v8_-08_11_implementation_guidance.pdf\", \"type\": \"pdf\"}, {\"title\": \"Requirements Specification (Amd 21/2025)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0086-data-security-and-protection-toolkit/dapb0086/0086_v8_2025_08_2025_reqspec.pdf\", \"type\": \"pdf\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#c7a2a9a0aba6a9a3e9b4b3a6a9a3a6b5a3b4e9a6b4b4b2b5a6a9a4a287a9afb4e9a9a2b3\", \"type\": \"page\"}, {\"title\": \"Appendix 1\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0086-data-security-and-protection-toolkit/dapb0086/dapb0086_appendix1-dsptv8_nhs_trusts_albs_icbs_csus_25-26.xlsx\", \"type\": \"word\"}, {\"title\": \"Appendix 2\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/dapb0086-data-security-and-protection-toolkit/dapb0086/dapb0086_appendix2-dsptv8_dentist_gp_it-supplier_la_optician_other_pharmacy_social-care_uni_25-26.xlsx\", \"type\": \"word\"}]", summary:"OVERVIEW  
The Data Security and Protection Toolkit (DSPT) is an online resource designed for organizations that handle NHS patient data. It allows these organizations to evaluate their adherence to data security and information governance standards set by the Department of Health and Social Care, including the 10 data security standards established by the National Data Guardian.

WHO IT APPLIES TO  
The DSPT is applicable to all organizations that access NHS patient data and systems. This includes healthcare providers, local authorities, and any other entities involved in the handling of personal health information.

WHY IT MATTERS  
Ensuring robust data security is crucial for protecting patient information and maintaining public trust in the healthcare system. The DSPT helps organizations demonstrate their commitment to data protection and compliance with legal requirements, thereby enhancing the overall security of NHS data.

COMPLIANCE  
Organizations are required to conduct self-assessments using the DSPT to confirm their compliance with the established data security standards. This process is essential for providing assurance that personal information is managed responsibly and securely, as mandated by the Health and Social Care Act 2012." },
  { ref:"DAPB2054-4026", title:"Friends and Family Test: Post-COVID Assessment Clinics Retired", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/standards-and-collections---withdrawn", conformance:"", documents:"[{\"title\": \"Information Standards Notice\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/4017/4017retirement.pdf\", \"type\": \"pdf\"}, {\"title\": \"Deprecation Notice\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/1557/1557deprecation.pdf\", \"type\": \"pdf\"}, {\"title\": \"briefing paper which was used as the basis of the approval of this deprecation\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/1594/1594deprecation-092022briefing.pdf\", \"type\": \"pdf\"}, {\"title\": \"Deprecation Notice\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/1594/1594deprecation.pdf\", \"type\": \"pdf\"}, {\"title\": \"DAPB is therefore deprecating this standard to ensure user awareness of the risks of continued use\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/data-and-information/information-standards/standards-and-collections/isb-0066/0066-deprecation.pdf\", \"type\": \"pdf\"}, {\"title\": \"Discharge to Assess (D2A).\", \"url\": \"https://www.nhs.uk/NHSEngland/keogh-review/Documents/quick-guides/Quick-Guide-discharge-to-access.pdf\", \"type\": \"pdf\"}, {\"title\": \"A supporting Information Standards Notice, confirming the retirement with immediate effect, was issued in July 2022\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/2075/2075retirement.pdf\", \"type\": \"pdf\"}, {\"title\": \"DCB3031 Amd 6/2021 Integrated Urgent Care Aggregate Data Collection (IUC ADC)\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/certificates/303162021-certificate.pdf\", \"type\": \"pdf\"}, {\"title\": \"DCB is therefore deprecating this standard to ensure user awareness of the risks of continued use\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/isb1572/1572411998deprecation.pdf\", \"type\": \"pdf\"}, {\"title\": \"ISB 0154 KP90: Uses of the Mental Health Act\", \"url\": \"http://webarchive.nationalarchives.gov.uk/20180307183501/http://content.digital.nhs.uk/media/18464/0154retirement/pdf/0154retirement.pdf\", \"type\": \"pdf\"}]", summary:"OVERVIEW  
The Friends and Family Test for Post-COVID Assessment Clinics has been officially retired as of July 1, 2025. This means that the collection of data related to this test is no longer approved for national use, as it has either been deemed unnecessary or replaced by a different standard.

WHO IT APPLIES TO  
This retirement applies to healthcare providers and organizations that previously utilized the Friends and Family Test for assessing patient experiences in Post-COVID Assessment Clinics. It is important for these entities to be aware of this change to ensure compliance with current data collection standards.

WHY IT MATTERS  
The retirement of this data collection standard is significant as it reflects the evolving needs of healthcare data management and patient feedback mechanisms. By discontinuing outdated practices, the NHS can focus on more relevant and effective methods of gathering patient experiences, ultimately improving healthcare services.

  { ref:"DAPB2054-3144", title:"Friends and Family Test: Quarterly Staff Survey", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/national-quarterly-pulse-survey-collection", conformance:"", documents:"[{\"title\": \"ARTICLEStrategic Data Collection Service (SDCS)The Strategic Data Collection Service (SDCS) is a secure data collection system used by health and social care organisations to submit data.\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/strategic-data-collection-service-sdcs\", \"type\": \"page\"}]", summary:"OVERVIEW  
The National Quarterly Pulse Survey (NQPS) is designed to gather feedback from NHS staff on their experiences and engagement levels. Conducted quarterly, except during the NHS Staff Survey in October, it aims to create a consistent method for understanding employee sentiment and facilitating improvements within the NHS.

WHO IT APPLIES TO  
This survey applies to all NHS staff across various trusts and healthcare organizations. It is essential for managers and decision-makers who are responsible for employee engagement and workplace improvements to participate in and utilize the insights gained from the survey.

WHY IT MATTERS  
The NQPS is crucial for enhancing the working environment within the NHS, as it provides timely insights into employee experiences. By regularly collecting and analyzing this data, organizations can make informed decisions that lead to a more supportive and effective workplace, ultimately benefiting both staff and patients.

COMPLIANCE  
Organizations are required to collect data during the first, second, and fourth quarters of the year, specifically in April, July, and January. Compliance with this survey is essential for maintaining a standardized approach to employee feedback and ensuring that the NHS can continuously improve as a workplace." },
  { ref:"DAPB2090-2171", title:"GPES: Learning Disabilities Data (LDD) 2024-25", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/gp-data-collections", conformance:"", documents:"[{\"title\": \"DAPB2090-3038 Assurance Certificate\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/certificates/2090-3038372020-certificate.pdf\", \"type\": \"pdf\"}, {\"title\": \"DAPB2236 Assurance Certificate\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/certificates/2236722020-certificate.pdf\", \"type\": \"pdf\"}]", summary:"OVERVIEW

  { ref:"DAPB3042", title:"Resident Doctors (RDs): Rota Code of Practice Compliance", type:"Collection", status:"Approved", date:"2025-07-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/resident-doctors-rota-code-of-practice-compliance-data-collection", conformance:"", documents:"[{\"title\": \"Work schedulepdfWork schedule means the work schedule as described in Section 8 of the Rota Code of Practice 2017 on the BMA website.\", \"url\": \"https://www.bma.org.uk/media/1985/code-of-practice-2017.pdf\", \"type\": \"pdf\"}]", summary:"OVERVIEW

This compliance initiative specifically applies to all doctors in training employed under the 2016 Terms and Conditions of Employment within the NHS. It is relevant to NHS employers who are responsible for creating and managing work schedules for these medical professionals. The initiative aims to support both the doctors and the employers in adhering to the established standards for work scheduling.

WHY IT MATTERS

NHS England will collect data to monitor adherence to the Rota Code of Practice, focusing on the timely provision of work schedules and roster details. This data collection will facilitate collaboration with employers to address any compliance challenges and implement necessary improvements. The goal is to ensure that all parties involved meet their obligations under the 2016 employment contract, thereby fostering a supportive work environment for doctors in training." },
  { ref:"DAPB1605", title:"Accessible Information", type:"Standard", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/dapb1605-accessible-information", conformance:"", documents:"[{\"title\": \"Information Standards Notice\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/dcb1605/dapb1605_3000000_2025-isn_.pdf\", \"type\": \"pdf\"}, {\"title\": \"[email protected]\", \"url\": \"https://digital.nhs.uk/cdn-cgi/l/email-protection#0f6a6168636e616b2161677c217f6e7d7b666c667f6e7b6660614f61677c21616a\", \"type\": \"page\"}]", summary:"OVERVIEW

  { ref:"DAPB2235-01", title:"GPES: National Diabetes Audit (Core)", type:"Collection", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/information-standards/governance/latest-activity/standards-and-collections/gp-data-collections", conformance:"", documents:"[{\"title\": \"DAPB2090-3038 Assurance Certificate\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/certificates/2090-3038372020-certificate.pdf\", \"type\": \"pdf\"}, {\"title\": \"DAPB2236 Assurance Certificate\", \"url\": \"https://digital.nhs.uk/binaries/content/assets/website-assets/isce/certificates/2236722020-certificate.pdf\", \"type\": \"pdf\"}]", summary:"OVERVIEW

  { ref:"DAPB4122", title:"Oliver McGowan Training", type:"Collection", status:"Approved", date:"2025-06-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/oliver-mcgowan-mandatory-training-on-learning-disability-and-autism", conformance:"", documents:"[{\"title\": \"ARTICLEData Collections Framework (DCF)The Data Collections Framework (DCF) is a secure national data collection system hosted by NHS England to submit data for some NHS England data collections.\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/data-collections-framework\", \"type\": \"page\"}, {\"title\": \"ARTICLEOliver McGowan Mandatory Training on Learning Disability and Autism Data Collection guidanceGuidance on submitting data for the Oliver McGowan Mandatory Training on Learning Disability and Autism Data Collection.\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/oliver-mcgowan-mandatory-training-on-learning-disability-and-autism/guidance\", \"type\": \"page\"}]", summary:"OVERVIEW

  { ref:"DAPB4108", title:"Digital Maturity Assessment (DMA)", type:"Collection", status:"Approved", date:"2025-04-01", link:"http://www.england.nhs.uk/digitaltechnology/connecteddigitalsystems/digital-maturity-assessment/", conformance:"", documents:"", summary:"OVERVIEW

  { ref:"DAPB4119", title:"Perinatal Pathology Data Set", type:"Collection", status:"Approved", date:"2025-04-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/perinatal-pathology", conformance:"", documents:"[{\"title\": \"ARTICLEData Collections Framework (DCF)The Data Collections Framework (DCF) is a secure national data collection system hosted by NHS England to submit data for some NHS England data collections.\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/data-collections-framework\", \"type\": \"page\"}, {\"title\": \"ARTICLEGuidance for Perinatal Pathology Providers submitting data to NHS EnglandData collection is requested by NHS England to understand the capacity and demand on the perinatal pathology service.  The data will require general management support at a service level to identify processes for collating the data and ensuring it is submitted to NHS England weekly.\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/perinatal-pathology/guidance-for-submitting-data\", \"type\": \"page\"}]", summary:"OVERVIEW

The All Age Continuing Care Data Set is a new information standard that will be implemented starting April 1, 2025. It focuses on collecting detailed patient-level data related to NHS Continuing Healthcare (NHS CHC), including patient details, eligibility, care activities, reviews, and care packages. This standard aims to enhance the quality and consistency of data collected about individuals receiving ongoing care funded by the NHS.

The Drugs Patient Level Contract Monitoring (DAPB2212) is a set of four information standards designed to ensure consistent reporting of cost and activity data from healthcare providers to commissioners. Approved on January 1, 2025, these standards aim to enhance the management and oversight of drug-related contracts within the NHS. They are published under the Health and Social Care Act 2012 and include detailed documentation for implementation.

WHO IT APPLIES TO  
These standards are relevant to NHS healthcare providers and commissioners involved in the management of drug contracts. They are intended for professionals responsible for data reporting and contract monitoring, ensuring that all parties adhere to the same guidelines and practices. This consistency is crucial for effective healthcare delivery and financial accountability.

  { ref:"DAPB4115", title:"Theatre Estate Register", type:"Collection", status:"Approved", date:"2024-12-01", link:"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/theatre-estates", conformance:"", documents:"[{\"title\": \"ARTICLEData Collections Framework (DCF)The Data Collections Framework (DCF) is a secure national data collection system hosted by NHS England to submit data for some NHS England data collections.\", \"url\": \"https://digital.nhs.uk/data-and-information/data-collections-and-data-sets/data-collections/data-collections-framework\", \"type\": \"page\"}]", summary:"OVERVIEW

/* ═══════════════════════════════════════════════════════════════
   DATE FORMATTING — DD/MM/YYYY
   ═══════════════════════════════════════════════════════════════ */
function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

/* ═══════════════════════════════════════════════════════════════
   TYPE PILL
   ═══════════════════════════════════════════════════════════════ */
function typePill(type) {
  if (!type) return '<span class="pill pill-default">-</span>';
  const t = type.toLowerCase();
  if (t.includes("standard") && t.includes("collection"))
    return `<span class="pill pill-both">${type}</span>`;
  if (t === "standard")
    return `<span class="pill pill-standard">${type}</span>`;
  if (t === "collection")
    return `<span class="pill pill-collection">${type}</span>`;
  if (t.includes("consultation"))
    return `<span class="pill pill-consult">${type}</span>`;
  return `<span class="pill pill-default">${type}</span>`;
}

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
const PAGE_SIZE = 25;
let currentPage = 1;
let sortKey     = "date";
let sortDir     = -1;
let filtered    = [];

/* ═══════════════════════════════════════════════════════════════
   FILTER
   ═══════════════════════════════════════════════════════════════ */
function applyFilters() {
  const search = document.getElementById("searchInput").value.toLowerCase().trim();
  const typeF  = document.getElementById("typeFilter").value;
  const yearF  = document.getElementById("yearFilter").value;

  filtered = DATA.filter(item => {
    const matchSearch = !search ||
      item.ref.toLowerCase().includes(search) ||
      item.title.toLowerCase().includes(search) ||
      item.type.toLowerCase().includes(search);
    const matchType = !typeF || item.type === typeF;
    const matchYear = !yearF || item.date.startsWith(yearF);
    return matchSearch && matchType && matchYear;
  });

  filtered.sort((a, b) => {
    let va = a[sortKey] || "";
    let vb = b[sortKey] || "";
    if (va < vb) return -1 * sortDir;
    if (va > vb) return  1 * sortDir;
    return 0;
  });

  currentPage = 1;
  render();
}

/* ═══════════════════════════════════════════════════════════════
   SORT
   ═══════════════════════════════════════════════════════════════ */
function sortBy(key) {
  if (sortKey === key) { sortDir = -sortDir; }
  else { sortKey = key; sortDir = 1; }
  updateSortArrows();
  applyFilters();
}

function updateSortArrows() {
  ["ref","title","type","date"].forEach(c => {
    const th  = document.getElementById(`th-${c}`);
    const arr = document.getElementById(`arr-${c}`);
    if (c === sortKey) {
      th.classList.add("sorted");
      arr.innerHTML = sortDir === 1 ? "&#8593;" : "&#8595;";
    } else {
      th.classList.remove("sorted");
      arr.innerHTML = "&#8597;";
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   RENDER TABLE
   ═══════════════════════════════════════════════════════════════ */
function render() {
  const totalItems = filtered.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const end   = Math.min(start + PAGE_SIZE, totalItems);
  const page  = filtered.slice(start, end);

  const tbody = document.getElementById("tableBody");

  if (page.length === 0) {
    tbody.innerHTML = `
      <tr class="empty-row">
        <td colspan="4">&#128203; No items match your search or filter.</td>
      </tr>`;
  } else {
    tbody.innerHTML = page.map(item => {

      /* Reference cell */
      const refCell = item.ref
        ? `<span class="ref-badge">${item.ref}</span>`
        : `<span class="ref-empty">-</span>`;

      /* Title cell — clickable link if link field is present */
      const titleCell = item.link
        ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="title-link">${item.title}</a>`
        : item.title;

      return `
        <tr>
          <td>${refCell}</td>
          <td>${titleCell}</td>
          <td>${typePill(item.type)}</td>
          <td class="date-cell">${fmtDate(item.date)}</td>
        </tr>`;
    }).join("");
  }

  /* Result info */
  const from = totalItems === 0 ? 0 : start + 1;
  document.getElementById("resultInfo").textContent =
    `Showing ${from}-${end} of ${totalItems} item${totalItems !== 1 ? "s" : ""}`;

  /* Page info */
  document.getElementById("pageInfo").textContent =
    `Page ${currentPage} of ${totalPages}`;

  renderPagination(totalPages);
}

/* ═══════════════════════════════════════════════════════════════
   RENDER PAGINATION
   ═══════════════════════════════════════════════════════════════ */
function renderPagination(totalPages) {
  const container = document.getElementById("pageBtns");
  container.innerHTML = "";

  function btn(label, action, disabled, active, ellipsis) {
    const b = document.createElement("button");
    b.className = "page-btn" +
      (active    ? " active"   : "") +
      (ellipsis  ? " ellipsis" : "");
    b.innerHTML = label;
    b.disabled  = disabled;
    if (!disabled && !active && !ellipsis) b.onclick = action;
    container.appendChild(b);
  }

  btn("&#171; First", () => goTo(1),                currentPage === 1,          false, false);
  btn("&#8249; Prev",  () => goTo(currentPage - 1), currentPage === 1,          false, false);

  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push("...");
    const lo = Math.max(2, currentPage - 1);
    const hi = Math.min(totalPages - 1, currentPage + 1);
    for (let i = lo; i <= hi; i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push("...");
    pages.push(totalPages);
  }

  pages.forEach(p => {
    if (p === "...") { btn("...", null, true, false, true); }
    else { btn(p, () => goTo(p), false, p === currentPage, false); }
  });

  btn("Next &#8250;", () => goTo(currentPage + 1), currentPage === totalPages, false, false);
  btn("Last &#187;",  () => goTo(totalPages),       currentPage === totalPages, false, false);
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
function goTo(page) {
  currentPage = page;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ═══════════════════════════════════════════════════════════════
   CLEAR FILTERS
   ═══════════════════════════════════════════════════════════════ */
function clearFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("typeFilter").value  = "";
  document.getElementById("yearFilter").value  = "";
  applyFilters();
}

/* ═══════════════════════════════════════════════════════════════
   EVENT LISTENERS + BOOT
   ═══════════════════════════════════════════════════════════════ */
document.getElementById("searchInput").addEventListener("input",  applyFilters);
document.getElementById("typeFilter").addEventListener("change", applyFilters);
document.getElementById("yearFilter").addEventListener("change", applyFilters);

updateSortArrows();
applyFilters();
</script>

name: Scrape NHS Digital and Deploy

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: pip install playwright beautifulsoup4 lxml openai requests cloudscraper

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Verify Playwright
        run: python -c "from playwright.sync_api import sync_playwright; print('Playwright OK')"

      - name: Run scraper
        run: python scraper.py

      - name: Generate AI summaries
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_summaries.py --auto

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d')"
          git push
